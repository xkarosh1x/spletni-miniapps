<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mini App — Тумблер тем</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Верхняя карточка */
        .theme-card {
            border-radius: 28px;
            padding: 24px 20px;
            margin-bottom: 24px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }

        /* Шапка с солнцем */
        .theme-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .sun-block {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(128,128,128,0.15);
            padding: 6px 16px 6px 12px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        .sun-circle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: gold;
            box-shadow: 0 0 8px currentColor;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .sun-label {
            font-weight: 600;
            font-size: 15px;
        }

        /* Ползунок (range) */
        .slider-container {
            margin: 24px 0 20px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            opacity: 0.7;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        /* Сетка кнопок тем (каждая со своей обводкой) */
        .themes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .theme-btn {
            padding: 10px 8px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            background: transparent;
            border-width: 2px;
            border-style: solid;
            transition: transform 0.1s, filter 0.2s;
        }

        .theme-btn:active {
            transform: scale(0.96);
        }

        /* Демо-блок */
        .demo-block {
            border-radius: 24px;
            padding: 18px;
            margin-top: 20px;
        }

        button.demo-action {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 14px;
            cursor: pointer;
        }

        /* ---------- ТЕМЫ (классы для body) ---------- */
        /* Светлая */
        body.theme-light {
            background-color: #f2f2f5;
            color: #1c1c1e;
        }
        body.theme-light .theme-card,
        body.theme-light .demo-block {
            background-color: #ffffff;
            border: 1px solid #e3e3e8;
        }
        body.theme-light .theme-btn {
            background: #ffffff;
            color: #1c1c1e;
        }
        body.theme-light .theme-btn:hover {
            background: #f0f0f2;
        }
        body.theme-light input[type="range"] {
            background: #c6c6c8;
        }
        body.theme-light input[type="range"]::-webkit-slider-thumb {
            background: #007aff;
        }
        body.theme-light .demo-action {
            background: #007aff;
            color: white;
        }

        /* Тёмная */
        body.theme-dark {
            background-color: #0a0a0a;
            color: #e0e0e0;
        }
        body.theme-dark .theme-card,
        body.theme-dark .demo-block {
            background-color: #1e1e1e;
            border: 1px solid #2c2c2c;
        }
        body.theme-dark .theme-btn {
            background: #1e1e1e;
            color: #e0e0e0;
        }
        body.theme-dark .theme-btn:hover {
            background: #2c2c2c;
        }
        body.theme-dark input[type="range"] {
            background: #3a3a3a;
        }
        body.theme-dark input[type="range"]::-webkit-slider-thumb {
            background: #0d6efd;
        }
        body.theme-dark .demo-action {
            background: #0d6efd;
            color: white;
        }

        /* Фиолетовая */
        body.theme-purple {
            background-color: #17092b;
            color: #e2d6ff;
        }
        body.theme-purple .theme-card,
        body.theme-purple .demo-block {
            background-color: #2a1642;
            border: 1px solid #6b3fa0;
        }
        body.theme-purple .theme-btn {
            background: #2a1642;
            color: #f0e6ff;
        }
        body.theme-purple .theme-btn:hover {
            background: #45216b;
        }
        body.theme-purple input[type="range"] {
            background: #5a3b7a;
        }
        body.theme-purple input[type="range"]::-webkit-slider-thumb {
            background: #b77eff;
        }
        body.theme-purple .demo-action {
            background: #9b59b6;
            color: white;
        }

        /* Зелёная */
        body.theme-green {
            background-color: #0a2a16;
            color: #c8f0dc;
        }
        body.theme-green .theme-card,
        body.theme-green .demo-block {
            background-color: #164e2c;
            border: 1px solid #2e8b57;
        }
        body.theme-green .theme-btn {
            background: #164e2c;
            color: #e0f5e8;
        }
        body.theme-green .theme-btn:hover {
            background: #236b3c;
        }
        body.theme-green input[type="range"] {
            background: #3b8a5a;
        }
        body.theme-green input[type="range"]::-webkit-slider-thumb {
            background: #4caf7f;
        }
        body.theme-green .demo-action {
            background: #2ecc71;
            color: #0a2a16;
        }

        /* Красная */
        body.theme-red {
            background-color: #2b0c0c;
            color: #ffd6d6;
        }
        body.theme-red .theme-card,
        body.theme-red .demo-block {
            background-color: #4e1c1c;
            border: 1px solid #bf4b4b;
        }
        body.theme-red .theme-btn {
            background: #4e1c1c;
            color: #ffdede;
        }
        body.theme-red .theme-btn:hover {
            background: #732b2b;
        }
        body.theme-red input[type="range"] {
            background: #aa5555;
        }
        body.theme-red input[type="range"]::-webkit-slider-thumb {
            background: #ff7a7a;
        }
        body.theme-red .demo-action {
            background: #e74c3c;
            color: white;
        }

        /* Синяя */
        body.theme-blue {
            background-color: #0a1a3a;
            color: #cfe3ff;
        }
        body.theme-blue .theme-card,
        body.theme-blue .demo-block {
            background-color: #1a2f5c;
            border: 1px solid #3a6ea5;
        }
        body.theme-blue .theme-btn {
            background: #1a2f5c;
            color: #d6e6ff;
        }
        body.theme-blue .theme-btn:hover {
            background: #26487a;
        }
        body.theme-blue input[type="range"] {
            background: #4c7db3;
        }
        body.theme-blue input[type="range"]::-webkit-slider-thumb {
            background: #5c9eff;
        }
        body.theme-blue .demo-action {
            background: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="theme-card">
        <div class="theme-header">
            <div class="current-label">🎨 Тумблер темы</div>
            <div class="sun-block" id="sunBlock">
                <div class="sun-circle" id="sunCircle"></div>
                <span class="sun-label" id="sunLabel">Тёмная</span>
            </div>
        </div>

        <!-- ползунок -->
        <div class="slider-container">
            <div class="slider-label">
                <span>← перетащите →</span>
                <span id="themeStepName">тёмная</span>
            </div>
            <input type="range" id="themeSlider" min="0" max="5" step="1" value="1">
        </div>

        <!-- кнопки с обводкой -->
        <div class="themes-grid" id="themesGrid"></div>
    </div>

    <div class="demo-block">
        <p>✨ Пример содержимого</p>
        <p>Цвет фона, текста и кнопок меняется согласно теме.</p>
        <button class="demo-action" id="demoBtn">Показать текущую тему</button>
    </div>
</div>

<script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.hide();

    // Список тем (индекс, id, название, цвет солнца, цвет ползунка/обводка)
    const themes = [
        { id: 'light',  name: 'Светлая',  sunColor: '#f1c40f', borderColor: '#c6c6c8' },
        { id: 'dark',   name: 'Тёмная',   sunColor: '#f9e45b', borderColor: '#3a3a3a' },
        { id: 'purple', name: 'Фиолетовая', sunColor: '#cd9eff', borderColor: '#a57cf0' },
        { id: 'green',  name: 'Зелёная',  sunColor: '#7bed9f', borderColor: '#4caf7f' },
        { id: 'red',    name: 'Красная',  sunColor: '#ff8a7a', borderColor: '#e67373' },
        { id: 'blue',   name: 'Синяя',    sunColor: '#6aa9ff', borderColor: '#5c9eff' }
    ];

    // DOM элементы
    const slider = document.getElementById('themeSlider');
    const themeStepName = document.getElementById('themeStepName');
    const sunCircle = document.getElementById('sunCircle');
    const sunLabel = document.getElementById('sunLabel');
    const themesGrid = document.getElementById('themesGrid');

    // Применить тему по индексу
    function applyThemeByIndex(index) {
        const theme = themes[index];
        if (!theme) return;
        // Удаляем все классы тем
        themes.forEach(t => document.body.classList.remove(`theme-${t.id}`));
        document.body.classList.add(`theme-${theme.id}`);
        // Обновляем солнце
        sunCircle.style.backgroundColor = theme.sunColor;
        sunCircle.style.boxShadow = `0 0 8px ${theme.sunColor}`;
        sunLabel.textContent = theme.name;
        themeStepName.textContent = theme.name;
        // Сохраняем в localStorage
        localStorage.setItem('selectedThemeIndex', index);
        // Синхронизация ползунка (если вызов не из слайдера)
        if (slider.value != index) slider.value = index;
    }

    // Получить индекс сохранённой темы
    function getSavedThemeIndex() {
        const saved = localStorage.getItem('selectedThemeIndex');
        if (saved !== null && !isNaN(parseInt(saved))) {
            let idx = parseInt(saved);
            if (idx >= 0 && idx < themes.length) return idx;
        }
        return 1; // по умолчанию тёмная (индекс 1)
    }

    // Генерация кнопок с их собственной обводкой
    function generateThemeButtons() {
        themesGrid.innerHTML = '';
        themes.forEach((theme, idx) => {
            const btn = document.createElement('button');
            btn.textContent = theme.name;
            btn.classList.add('theme-btn');
            btn.style.borderColor = theme.borderColor;
            btn.style.borderWidth = '2px';
            btn.style.borderStyle = 'solid';
            btn.addEventListener('click', () => {
                applyThemeByIndex(idx);
            });
            themesGrid.appendChild(btn);
        });
    }

    // Слушатель ползунка
    slider.addEventListener('input', (e) => {
        const idx = parseInt(e.target.value);
        applyThemeByIndex(idx);
    });

    // Демо-кнопка: показываем текущую тему через Telegram Popup
    document.getElementById('demoBtn').addEventListener('click', () => {
        const currentThemeClass = document.body.className.match(/theme-(\w+)/)?.[1];
        const themeObj = themes.find(t => t.id === currentThemeClass);
        const themeName = themeObj ? themeObj.name : 'тёмная';
        tg.showPopup({
            title: '🎨 Текущая тема',
            message: `Активна тема: "${themeName}".\nИнтерфейс полностью перестроен.`,
            buttons: [{type: 'ok'}]
        });
    });

    // Инициализация
    generateThemeButtons();
    const startIndex = getSavedThemeIndex();
    applyThemeByIndex(startIndex);
</script>
</body>
</html>
