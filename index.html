<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mini App — Шрифты + Тёмная тема</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Подключаем шрифт Minecraft через CDN -->
    <link href="https://cdn.jsdelivr.net/npm/typeface-minecraft@1.0.0/index.min.css" rel="stylesheet">

    <!-- Google Fonts для других шрифтов -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s;
        }

        body {
            font-family: 'Minecraft', 'Courier New', monospace; /* Шрифт по умолчанию — Minecraft */
            padding: 20px;
            min-height: 100vh;
        }

        /* Кнопка смены шрифта (круг в правом верхнем углу) */
        .font-switch {
            position: fixed;
            top: 20px;
            right: 80px; /* Чуть левее, чтобы не перекрывать кнопку темы */
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.1s, box-shadow 0.2s;
            background-color: #2c2c2c; /* Цвет по умолчанию (будет меняться вместе с темой) */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }
        .font-switch:active {
            transform: scale(0.94);
        }

        /* Кнопка смены темы (круг в правом верхнем углу) */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .theme-switch:active {
            transform: scale(0.94);
        }

        /* Всплывающее уведомление (тост) */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1001;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding-top: 20px;
        }

        .card {
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }

        .demo-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
        }

        /* ---------- ТЕМЫ ---------- */
        body.theme-light {
            background: #f5f5f7;
            color: #1c1c1e;
        }
        body.theme-light .card {
            background: #ffffff;
            border: 1px solid #e3e3e8;
        }
        body.theme-light .demo-btn {
            background: #007aff;
            color: white;
        }
        body.theme-light .font-switch {
            background-color: #2c2c2c;
        }

        body.theme-dark {
            background: #0a0a0a;
            color: #e0e0e0;
        }
        body.theme-dark .card {
            background: #1e1e1e;
            border: 1px solid #2c2c2c;
        }
        body.theme-dark .demo-btn {
            background: #0d6efd;
            color: white;
        }
        body.theme-dark .font-switch {
            background-color: #2c2c2c;
        }

        body.theme-purple {
            background: #17092b;
            color: #e2d6ff;
        }
        body.theme-purple .card {
            background: #2a1642;
            border: 1px solid #6b3fa0;
        }
        body.theme-purple .demo-btn {
            background: #9b59b6;
            color: white;
        }
        body.theme-purple .font-switch {
            background-color: #2c2c2c;
        }

        body.theme-green {
            background: #0a2a16;
            color: #c8f0dc;
        }
        body.theme-green .card {
            background: #164e2c;
            border: 1px solid #2e8b57;
        }
        body.theme-green .demo-btn {
            background: #2ecc71;
            color: #0a2a16;
        }
        body.theme-green .font-switch {
            background-color: #2c2c2c;
        }

        body.theme-red {
            background: #2b0c0c;
            color: #ffd6d6;
        }
        body.theme-red .card {
            background: #4e1c1c;
            border: 1px solid #bf4b4b;
        }
        body.theme-red .demo-btn {
            background: #e74c3c;
            color: white;
        }
        body.theme-red .font-switch {
            background-color: #2c2c2c;
        }

        body.theme-blue {
            background: #0a1a3a;
            color: #cfe3ff;
        }
        body.theme-blue .card {
            background: #1a2f5c;
            border: 1px solid #3a6ea5;
        }
        body.theme-blue .demo-btn {
            background: #3b82f6;
            color: white;
        }
        body.theme-blue .font-switch {
            background-color: #2c2c2c;
        }
    </style>
</head>
<body>
    <!-- Кнопка смены шрифта -->
    <div class="font-switch" id="fontSwitch">Aa</div>
    <!-- Кнопка смены темы -->
    <div class="theme-switch" id="themeSwitch"></div>
    <div class="toast" id="toast"></div>

    <div class="container">
        <div class="card">
            <h2>🎨 Смена шрифта и темы</h2>
            <p>Нажми на <strong>левое</strong> кружок (Aa), чтобы изменить шрифт.</p>
            <p>Нажми на <strong>правое</strong> кружок, чтобы изменить тему.</p>
            <button class="demo-btn" id="demoBtn">Показать текущую тему и шрифт</button>
        </div>
        <div class="card">
            <p>✨ Пример контента. Текст будет менять стиль вместе со шрифтом.</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        // --- Темы (оставляем как было) ---
        const themes = [
            { id: 'light',  name: 'Светлая',  color: '#f1c40f' },
            { id: 'dark',   name: 'Тёмная',   color: '#f9e45b' },
            { id: 'purple', name: 'Фиолетовая', color: '#cd9eff' },
            { id: 'green',  name: 'Зелёная',  color: '#7bed9f' },
            { id: 'red',    name: 'Красная',  color: '#ff8a7a' },
            { id: 'blue',   name: 'Синяя',    color: '#6aa9ff' }
        ];

        let currentThemeIndex = 1; // стартуем с тёмной

        const themeSwitch = document.getElementById('themeSwitch');
        const toast = document.getElementById('toast');

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        function applyTheme(index) {
            const theme = themes[index];
            document.body.classList.remove(...themes.map(t => `theme-${t.id}`));
            document.body.classList.add(`theme-${theme.id}`);
            themeSwitch.style.backgroundColor = theme.color;
            themeSwitch.style.boxShadow = `0 0 6px ${theme.color}`;
            currentThemeIndex = index;
            localStorage.setItem('selectedThemeIndex', index);
            showToast(`Тема: ${theme.name}`);
        }

        function nextTheme() {
            let newIndex = currentThemeIndex + 1;
            if (newIndex >= themes.length) newIndex = 0;
            applyTheme(newIndex);
        }

        function loadSavedTheme() {
            const saved = localStorage.getItem('selectedThemeIndex');
            let idx = (saved !== null && !isNaN(parseInt(saved))) ? parseInt(saved) : 1;
            if (idx < 0) idx = 0;
            if (idx >= themes.length) idx = themes.length - 1;
            applyTheme(idx);
        }

        // --- Шрифты (5 популярных + Minecraft по умолчанию) ---
        const fonts = [
            { name: 'Minecraft', family: "'Minecraft', monospace" },
            { name: 'Roboto', family: "'Roboto', sans-serif" },
            { name: 'Open Sans', family: "'Open Sans', sans-serif" },
            { name: 'Montserrat', family: "'Montserrat', sans-serif" },
            { name: 'Arial', family: "Arial, sans-serif" },
            { name: 'Helvetica', family: "Helvetica, sans-serif" }
        ];

        let currentFontIndex = 0; // начинаем с Minecraft

        const fontSwitch = document.getElementById('fontSwitch');

        function applyFont(index) {
            const font = fonts[index];
            document.body.style.fontFamily = font.family;
            currentFontIndex = index;
            localStorage.setItem('selectedFontIndex', index);
            showToast(`Шрифт: ${font.name}`);
        }

        function nextFont() {
            let newIndex = currentFontIndex + 1;
            if (newIndex >= fonts.length) newIndex = 0;
            applyFont(newIndex);
        }

        function loadSavedFont() {
            const saved = localStorage.getItem('selectedFontIndex');
            let idx = (saved !== null && !isNaN(parseInt(saved))) ? parseInt(saved) : 0;
            if (idx < 0) idx = 0;
            if (idx >= fonts.length) idx = fonts.length - 1;
            applyFont(idx);
        }

        // --- Обработчики кликов ---
        themeSwitch.addEventListener('click', nextTheme);
        fontSwitch.addEventListener('click', nextFont);

        // --- Демо-кнопка ---
        document.getElementById('demoBtn').addEventListener('click', () => {
            const currentTheme = themes[currentThemeIndex];
            const currentFont = fonts[currentFontIndex];
            tg.showPopup({
                title: '🎨 Настройки',
                message: `Тема: "${currentTheme.name}"\nШрифт: "${currentFont.name}"`,
                buttons: [{type: 'ok'}]
            });
        });

        // --- Инициализация ---
        loadSavedTheme();
        loadSavedFont();
    </script>
</body>
</html>
