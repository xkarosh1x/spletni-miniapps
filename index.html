<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Моё Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
        }
        .user-info {
            background: var(--tg-theme-bg-color, #ffffff);
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>👋 Привет из Mini App!</h2>
            <p>Это ваше первое мини-приложение для Telegram.</p>
        </div>

        <div class="user-info" id="userInfo">
            Загрузка данных пользователя...
        </div>

        <button id="closeBtn">Закрыть приложение</button>
        <button id="sendDataBtn">Отправить данные боту</button>
    </div>

    <script>
        // Инициализируем Telegram WebApp
        const tg = window.Telegram.WebApp;
        
        // Расширяем на весь экран
        tg.expand();
        
        // Показываем основную кнопку внизу экрана (опционально)
        tg.MainButton.setText("Готово");
        tg.MainButton.show();
        
        // Обработчик основной кнопки
        tg.MainButton.onClick(() => {
            tg.showPopup({
                title: "Уведомление",
                message: "Вы нажали на основную кнопку!",
                buttons: [{type: "ok"}]
            });
        });
        
        // Получаем данные пользователя
        const user = tg.initDataUnsafe?.user;
        
        if (user) {
            document.getElementById('userInfo').innerHTML = `
                <strong>Ваши данные из Telegram:</strong><br>
                🆔 ID: ${user.id}<br>
                👤 Имя: ${user.first_name} ${user.last_name || ''}<br>
                @${user.username || 'нет username'}<br>
                ${user.language_code ? `🌐 Язык: ${user.language_code}` : ''}
            `;
        } else {
            document.getElementById('userInfo').innerHTML = `
                ℹ️ Приложение открыто вне Telegram или данные недоступны.<br>
                <small>(Это нормально при локальной разработке)</small>
            `;
        }
        
        // Закрыть приложение
        document.getElementById('closeBtn').addEventListener('click', () => {
            tg.close();
        });
        
        // Отправить данные боту
        document.getElementById('sendDataBtn').addEventListener('click', () => {
            tg.sendData(JSON.stringify({
                action: 'button_clicked',
                timestamp: Date.now(),
                userId: user?.id || null
            }));
        });
    </script>
</body>
</html>
