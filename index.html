<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mini App — Круг-тумблер тем</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* чтобы не выделялся текст при движении */
            transition: background-color 0.2s ease, color 0.2s, border-color 0.2s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
        }

        /* основная карточка */
        .theme-card {
            border-radius: 32px;
            padding: 30px 20px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* заголовок */
        .title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        /* Круглая кнопка-солнце */
        .sun-toggle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 20px auto;
            cursor: grab;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.2s;
            touch-action: none;  /* важно для перехвата touchmove */
        }
        .sun-toggle:active {
            cursor: grabbing;
            transform: scale(0.97);
        }

        /* Текст текущей темы */
        .theme-name {
            font-size: 24px;
            font-weight: 700;
            margin: 16px 0 8px;
        }

        .hint {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 8px;
        }

        /* демо-блок */
        .demo-block {
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }
        .demo-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
        }

        /* ---------- ТЕМЫ ---------- */
        /* Светлая */
        body.theme-light {
            background: #f5f5f7;
            color: #1c1c1e;
        }
        body.theme-light .theme-card,
        body.theme-light .demo-block {
            background: #ffffff;
            border: 1px solid #e3e3e8;
        }
        body.theme-light .demo-btn {
            background: #007aff;
            color: white;
        }

        /* Тёмная */
        body.theme-dark {
            background: #0a0a0a;
            color: #e0e0e0;
        }
        body.theme-dark .theme-card,
        body.theme-dark .demo-block {
            background: #1e1e1e;
            border: 1px solid #2c2c2c;
        }
        body.theme-dark .demo-btn {
            background: #0d6efd;
            color: white;
        }

        /* Фиолетовая */
        body.theme-purple {
            background: #17092b;
            color: #e2d6ff;
        }
        body.theme-purple .theme-card,
        body.theme-purple .demo-block {
            background: #2a1642;
            border: 1px solid #6b3fa0;
        }
        body.theme-purple .demo-btn {
            background: #9b59b6;
            color: white;
        }

        /* Зелёная */
        body.theme-green {
            background: #0a2a16;
            color: #c8f0dc;
        }
        body.theme-green .theme-card,
        body.theme-green .demo-block {
            background: #164e2c;
            border: 1px solid #2e8b57;
        }
        body.theme-green .demo-btn {
            background: #2ecc71;
            color: #0a2a16;
        }

        /* Красная */
        body.theme-red {
            background: #2b0c0c;
            color: #ffd6d6;
        }
        body.theme-red .theme-card,
        body.theme-red .demo-block {
            background: #4e1c1c;
            border: 1px solid #bf4b4b;
        }
        body.theme-red .demo-btn {
            background: #e74c3c;
            color: white;
        }

        /* Синяя */
        body.theme-blue {
            background: #0a1a3a;
            color: #cfe3ff;
        }
        body.theme-blue .theme-card,
        body.theme-blue .demo-block {
            background: #1a2f5c;
            border: 1px solid #3a6ea5;
        }
        body.theme-blue .demo-btn {
            background: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="theme-card">
        <div class="title">🌞 Тяни круг вверх/вниз</div>
        <div class="sun-toggle" id="sunToggle"></div>
        <div class="theme-name" id="themeNameLabel">Тёмная</div>
        <div class="hint">👇 Зажми и веди пальцем вверх/вниз</div>
    </div>
    <div class="demo-block">
        <p>✨ Демо-контент</p>
        <p>Цвета меняются вместе с темой.</p>
        <button class="demo-btn" id="demoBtn">Показать тему</button>
    </div>
</div>

<script>
    // --- 1. Инициализация Telegram ---
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.hide();

    // --- 2. Список тем (индекс, id, название, цвет круга) ---
    const themes = [
        { id: 'light',  name: 'Светлая',  color: '#f1c40f' },
        { id: 'dark',   name: 'Тёмная',   color: '#f9e45b' },
        { id: 'purple', name: 'Фиолетовая', color: '#cd9eff' },
        { id: 'green',  name: 'Зелёная',  color: '#7bed9f' },
        { id: 'red',    name: 'Красная',  color: '#ff8a7a' },
        { id: 'blue',   name: 'Синяя',    color: '#6aa9ff' }
    ];

    let currentIndex = 1; // по умолчанию тёмная (индекс 1)
    let isDragging = false;
    let startY = 0;
    let lastChangeDelta = 0; // для предотвращения слишком частых срабатываний

    // DOM элементы
    const sunToggle = document.getElementById('sunToggle');
    const themeNameLabel = document.getElementById('themeNameLabel');

    // --- 3. Применить тему по индексу ---
    function applyTheme(index) {
        if (index < 0) index = 0;
        if (index >= themes.length) index = themes.length - 1;
        const theme = themes[index];
        // меняем класс body
        document.body.classList.remove(...themes.map(t => `theme-${t.id}`));
        document.body.classList.add(`theme-${theme.id}`);
        // меняем цвет круга
        sunToggle.style.backgroundColor = theme.color;
        sunToggle.style.boxShadow = `0 0 12px ${theme.color}`;
        // меняем текст названия темы
        themeNameLabel.textContent = theme.name;
        // сохраняем индекс
        currentIndex = index;
        localStorage.setItem('selectedThemeIndex', index);
    }

    // --- 4. Загрузить сохранённую тему ---
    function loadSavedTheme() {
        const saved = localStorage.getItem('selectedThemeIndex');
        let idx = (saved !== null && !isNaN(parseInt(saved))) ? parseInt(saved) : 1;
        if (idx < 0) idx = 0;
        if (idx >= themes.length) idx = themes.length - 1;
        applyTheme(idx);
    }

    // --- 5. Обработчики для перетаскивания ---
    function handleStart(e) {
        // Предотвращаем стандартное поведение (скролл)
        e.preventDefault();
        isDragging = true;
        // Получаем начальную координату Y (для мыши или касания)
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        startY = clientY;
        lastChangeDelta = 0;
        sunToggle.style.cursor = 'grabbing';
    }

    function handleMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let deltaY = clientY - startY;
        // Чувствительность: каждые 20 пикселей движения — смена темы
        const threshold = 20;
        let deltaSteps = Math.floor(deltaY / threshold);
        if (deltaSteps !== lastChangeDelta) {
            let newIndex = currentIndex - deltaSteps; // движение вверх уменьшает индекс? логика: вверх -> предыдущая тема, вниз -> следующая
            // Но обычно: потянул вверх (deltaY отрицательная) -> предыдущая тема (индекс уменьшается)
            // Потянул вниз (deltaY положительная) -> следующая тема (индекс увеличивается)
            // Упростим: newIndex = currentIndex - deltaSteps
            if (newIndex < 0) newIndex = 0;
            if (newIndex >= themes.length) newIndex = themes.length - 1;
            if (newIndex !== currentIndex) {
                applyTheme(newIndex);
                // обновляем startY, чтобы следующий шаг считался от новой позиции
                startY = clientY;
                lastChangeDelta = 0;
            } else {
                lastChangeDelta = deltaSteps;
            }
        }
    }

    function handleEnd(e) {
        isDragging = false;
        sunToggle.style.cursor = 'grab';
        // фиксируем тему (уже зафиксирована в applyTheme)
    }

    // Подключаем события для мыши и касаний
    sunToggle.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    sunToggle.addEventListener('touchstart', handleStart, { passive: false });
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', handleEnd);

    // --- 6. Демо-кнопка ---
    document.getElementById('demoBtn').addEventListener('click', () => {
        const currentTheme = themes.find((_, idx) => idx === currentIndex);
        tg.showPopup({
            title: '🎨 Текущая тема',
            message: `Выбрана тема: "${currentTheme.name}".\nЦвет круга соответствует теме.`,
            buttons: [{type: 'ok'}]
        });
    });

    // Запуск
    loadSavedTheme();
    sunToggle.style.cursor = 'grab';
</script>
</body>
</html>
