<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mini App — Вкладки + Пиксель</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s;
            font-family: 'Courier New', 'Lucida Console', 'Monaco', monospace !important;
        }

        body {
            padding: 20px 20px 80px 20px; /* отступ снизу под таб-бар */
            min-height: 100vh;
        }

        /* Кнопка смены темы (правый верхний угол) */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .theme-switch:active {
            transform: scale(0.94);
        }

        /* Кнопка смены языка (левый верхний угол) */
        .lang-switch {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            background: #2c2c2c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .lang-switch:active {
            transform: scale(0.94);
        }

        /* Тост */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            z-index: 1001;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }

        /* Нижний таб-бар */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(30,30,30,0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px;
            z-index: 1002;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.1s;
            font-weight: 600;
            font-size: 14px;
            color: #aaa;
        }
        .tab-item.active {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        body.theme-light .tab-bar {
            background: rgba(245,245,247,0.95);
            border-top-color: rgba(0,0,0,0.1);
        }
        body.theme-light .tab-item {
            color: #555;
        }
        body.theme-light .tab-item.active {
            background: rgba(0,0,0,0.1);
            color: #000;
        }

        /* Страницы (вкладки) */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
        }

        .card {
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
        }

        /* Анкета (профиль) */
        .avatar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            background: #888;
            border: 3px solid currentColor;
        }
        .avatar-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }
        .profile-info {
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-field {
            margin: 16px 0;
        }
        .profile-field label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .profile-field input, .profile-field textarea {
            width: 100%;
            padding: 10px;
            border-radius: 16px;
            border: 1px solid #aaa;
            background: rgba(255,255,255,0.1);
            font-size: 14px;
            resize: vertical;
        }
        .file-input {
            margin: 10px 0;
        }

        /* Задачи: чекбоксы */
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .task-item input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* Поддержка: форма */
        .support-input, .support-textarea {
            width: 100%;
            padding: 10px;
            border-radius: 16px;
            border: 1px solid #aaa;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.1);
        }

        /* ----- ТЕМЫ (общие для всех страниц) ----- */
        body.theme-light {
            background: #f5f5f7;
            color: #1c1c1e;
        }
        body.theme-light .card {
            background: #ffffff;
            border: 1px solid #e3e3e8;
        }
        body.theme-light .btn {
            background: #007aff;
            color: white;
        }
        body.theme-light input, body.theme-light textarea {
            background: #f0f0f2;
            color: #1c1c1e;
            border-color: #ccc;
        }

        body.theme-dark {
            background: #0a0a0a;
            color: #e0e0e0;
        }
        body.theme-dark .card {
            background: #1e1e1e;
            border: 1px solid #2c2c2c;
        }
        body.theme-dark .btn {
            background: #0d6efd;
            color: white;
        }
        body.theme-dark input, body.theme-dark textarea {
            background: #2a2a2a;
            color: #e0e0e0;
            border-color: #444;
        }

        body.theme-purple {
            background: #17092b;
            color: #e2d6ff;
        }
        body.theme-purple .card {
            background: #2a1642;
            border: 1px solid #6b3fa0;
        }
        body.theme-purple .btn {
            background: #9b59b6;
            color: white;
        }
        body.theme-purple input, body.theme-purple textarea {
            background: #3a235a;
            color: #e2d6ff;
            border-color: #7a4fa0;
        }

        body.theme-green {
            background: #0a2a16;
            color: #c8f0dc;
        }
        body.theme-green .card {
            background: #164e2c;
            border: 1px solid #2e8b57;
        }
        body.theme-green .btn {
            background: #2ecc71;
            color: #0a2a16;
        }
        body.theme-green input, body.theme-green textarea {
            background: #1e5a36;
            color: #c8f0dc;
            border-color: #3a8a5a;
        }

        body.theme-red {
            background: #2b0c0c;
            color: #ffd6d6;
        }
        body.theme-red .card {
            background: #4e1c1c;
            border: 1px solid #bf4b4b;
        }
        body.theme-red .btn {
            background: #e74c3c;
            color: white;
        }
        body.theme-red input, body.theme-red textarea {
            background: #5e2a2a;
            color: #ffd6d6;
            border-color: #b55a5a;
        }

        body.theme-blue {
            background: #0a1a3a;
            color: #cfe3ff;
        }
        body.theme-blue .card {
            background: #1a2f5c;
            border: 1px solid #3a6ea5;
        }
        body.theme-blue .btn {
            background: #3b82f6;
            color: white;
        }
        body.theme-blue input, body.theme-blue textarea {
            background: #1e3a6e;
            color: #cfe3ff;
            border-color: #5a8ac0;
        }
    </style>
</head>
<body>
    <div class="lang-switch" id="langSwitch">RU</div>
    <div class="theme-switch" id="themeSwitch"></div>
    <div class="toast" id="toast"></div>

    <!-- Вкладка: Задачи -->
    <div id="tasksPage" class="page">
        <div class="container">
            <div class="card">
                <h2 id="tasksTitle">📋 Задачи</h2>
                <div id="tasksList">
                    <!-- динамические задачи -->
                </div>
            </div>
        </div>
    </div>

    <!-- Вкладка: Чаты -->
    <div id="chatsPage" class="page">
        <div class="container">
            <div class="card">
                <h2 id="chatsTitle">💬 Чаты</h2>
                <p id="chatsPlaceholder">Скоро здесь появятся ваши диалоги...</p>
            </div>
        </div>
    </div>

    <!-- Вкладка: Анкета (профиль) -->
    <div id="profilePage" class="page">
        <div class="container">
            <div class="card">
                <div class="avatar-container" id="avatarContainer"></div>
                <div class="profile-info">
                    <p><strong id="labelTgId">Telegram ID:</strong> <span id="tgId">—</span></p>
                    <p><strong id="labelUsername">Username:</strong> <span id="tgUsername">—</span></p>
                    <p><strong id="labelFirstName">Имя:</strong> <span id="tgFirstName">—</span></p>
                </div>
                <div class="profile-field">
                    <label id="labelBio">✏️ Описание профиля</label>
                    <textarea id="bioInput" rows="3" placeholder="Расскажите о себе..."></textarea>
                </div>
                <div class="profile-field">
                    <label id="labelAvatar">🖼️ Загрузить аватар</label>
                    <input type="file" id="avatarInput" accept="image/*" class="file-input">
                </div>
            </div>
        </div>
    </div>

    <!-- Вкладка: Поддержка -->
    <div id="supportPage" class="page">
        <div class="container">
            <div class="card">
                <h2 id="supportTitle">🛠️ Поддержка</h2>
                <input type="text" id="supportSubject" class="support-input" placeholder="Тема">
                <textarea id="supportMessage" rows="4" class="support-textarea" placeholder="Сообщение"></textarea>
                <button class="btn" id="sendSupportBtn">Отправить</button>
            </div>
        </div>
    </div>

    <!-- Нижний таб-бар -->
    <div class="tab-bar">
        <div class="tab-item" data-tab="tasks">📋 <span id="tabTasksLabel">Задачи</span></div>
        <div class="tab-item" data-tab="chats">💬 <span id="tabChatsLabel">Чаты</span></div>
        <div class="tab-item" data-tab="profile">👤 <span id="tabProfileLabel">Анкета</span></div>
        <div class="tab-item" data-tab="support">🛠️ <span id="tabSupportLabel">Поддержка</span></div>
    </div>

    <script>
        // --- Telegram WebApp и данные пользователя ---
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        let user = tg.initDataUnsafe?.user || null;
        if (!user) {
            user = { id: 123456, first_name: "Игрок", last_name: "", username: "pixel_player" };
        }

        // --- Элементы табов ---
        const pages = {
            tasks: document.getElementById('tasksPage'),
            chats: document.getElementById('chatsPage'),
            profile: document.getElementById('profilePage'),
            support: document.getElementById('supportPage')
        };
        let currentTab = 'tasks';

        function showTab(tabId) {
            // Скрыть все страницы
            Object.values(pages).forEach(page => page.classList.remove('active'));
            pages[tabId].classList.add('active');
            // Обновить активный класс в таб-баре
            document.querySelectorAll('.tab-item').forEach(item => {
                if (item.dataset.tab === tabId) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            currentTab = tabId;
            localStorage.setItem('lastTab', tabId);
            // Если открыли анкету – обновить аватар
            if (tabId === 'profile') renderAvatar();
        }

        document.querySelectorAll('.tab-item').forEach(item => {
            item.addEventListener('click', () => showTab(item.dataset.tab));
        });

        // --- Тост ---
        const toast = document.getElementById('toast');
        let toastTimeout = null;
        function showToast(message) {
            if (toastTimeout) clearTimeout(toastTimeout);
            toast.classList.remove('show');
            void toast.offsetWidth;
            toast.textContent = message;
            toast.classList.add('show');
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
                toastTimeout = null;
            }, 1500);
        }

        // --- Языки и переводы ---
        const translations = {
            ru: {
                langName: 'Русский',
                tabTasks: 'Задачи',
                tabChats: 'Чаты',
                tabProfile: 'Анкета',
                tabSupport: 'Поддержка',
                tasksTitle: '📋 Задачи',
                chatsTitle: '💬 Чаты',
                chatsPlaceholder: 'Скоро здесь появятся ваши диалоги...',
                supportTitle: '🛠️ Поддержка',
                supportSubjectPlaceholder: 'Тема',
                supportMessagePlaceholder: 'Сообщение',
                supportSendBtn: 'Отправить',
                supportSent: 'Сообщение отправлено (демо)',
                labelTgId: 'Telegram ID:',
                labelUsername: 'Username:',
                labelFirstName: 'Имя:',
                labelBio: '✏️ Описание профиля',
                labelAvatar: '🖼️ Загрузить аватар',
                bioPlaceholder: 'Расскажите о себе...',
                task1: 'Изучить документацию Telegram Mini Apps',
                task2: 'Сделать дизайн в пиксельном стиле',
                task3: 'Добавить нижнее меню',
                task4: 'Протестировать на всех темах'
            },
            en: {
                langName: 'English',
                tabTasks: 'Tasks',
                tabChats: 'Chats',
                tabProfile: 'Profile',
                tabSupport: 'Support',
                tasksTitle: '📋 Tasks',
                chatsTitle: '💬 Chats',
                chatsPlaceholder: 'Your conversations will appear here soon...',
                supportTitle: '🛠️ Support',
                supportSubjectPlaceholder: 'Subject',
                supportMessagePlaceholder: 'Message',
                supportSendBtn: 'Send',
                supportSent: 'Message sent (demo)',
                labelTgId: 'Telegram ID:',
                labelUsername: 'Username:',
                labelFirstName: 'Name:',
                labelBio: '✏️ Profile bio',
                labelAvatar: '🖼️ Upload avatar',
                bioPlaceholder: 'Tell about yourself...',
                task1: 'Learn Telegram Mini Apps docs',
                task2: 'Make pixel style design',
                task3: 'Add bottom tab bar',
                task4: 'Test on all themes'
            }
        };

        let currentLang = localStorage.getItem('selectedLang') || 'ru';

        function applyLanguage(lang) {
            const t = translations[lang];
            if (!t) return;
            // Тексты табов
            document.getElementById('tabTasksLabel').innerText = t.tabTasks;
            document.getElementById('tabChatsLabel').innerText = t.tabChats;
            document.getElementById('tabProfileLabel').innerText = t.tabProfile;
            document.getElementById('tabSupportLabel').innerText = t.tabSupport;
            // Заголовки страниц
            document.getElementById('tasksTitle').innerText = t.tasksTitle;
            document.getElementById('chatsTitle').innerText = t.chatsTitle;
            document.getElementById('chatsPlaceholder').innerText = t.chatsPlaceholder;
            document.getElementById('supportTitle').innerText = t.supportTitle;
            const subjectInput = document.getElementById('supportSubject');
            const messageInput = document.getElementById('supportMessage');
            subjectInput.placeholder = t.supportSubjectPlaceholder;
            messageInput.placeholder = t.supportMessagePlaceholder;
            document.getElementById('sendSupportBtn').innerText = t.supportSendBtn;
            // Анкета
            document.getElementById('labelTgId').innerHTML = t.labelTgId;
            document.getElementById('labelUsername').innerHTML = t.labelUsername;
            document.getElementById('labelFirstName').innerHTML = t.labelFirstName;
            document.getElementById('labelBio').innerHTML = t.labelBio;
            document.getElementById('labelAvatar').innerHTML = t.labelAvatar;
            document.getElementById('bioInput').placeholder = t.bioPlaceholder;
            // Задачи – обновить список
            renderTasksList(lang);
            langSwitch.innerText = lang === 'ru' ? 'RU' : 'EN';
            localStorage.setItem('selectedLang', lang);
            currentLang = lang;
            showToast(t.langName);
        }

        function renderTasksList(lang) {
            const t = translations[lang];
            const tasks = [
                t.task1,
                t.task2,
                t.task3,
                t.task4
            ];
            const container = document.getElementById('tasksList');
            if (!container) return;
            container.innerHTML = '';
            tasks.forEach((task, idx) => {
                const div = document.createElement('div');
                div.className = 'task-item';
                const chk = document.createElement('input');
                chk.type = 'checkbox';
                chk.id = `task${idx}`;
                const label = document.createElement('label');
                label.htmlFor = `task${idx}`;
                label.innerText = task;
                div.appendChild(chk);
                div.appendChild(label);
                container.appendChild(div);
            });
        }

        function toggleLanguage() {
            const newLang = currentLang === 'ru' ? 'en' : 'ru';
            applyLanguage(newLang);
        }

        document.getElementById('langSwitch').addEventListener('click', toggleLanguage);

        // --- Темы (прежние) ---
        const themes = [
            { id: 'light',  name: 'Светлая',  color: '#f1c40f' },
            { id: 'dark',   name: 'Тёмная',   color: '#f9e45b' },
            { id: 'purple', name: 'Фиолетовая', color: '#cd9eff' },
            { id: 'green',  name: 'Зелёная',  color: '#7bed9f' },
            { id: 'red',    name: 'Красная',  color: '#ff8a7a' },
            { id: 'blue',   name: 'Синяя',    color: '#6aa9ff' }
        ];
        let currentThemeIndex = 1;
        const themeSwitch = document.getElementById('themeSwitch');

        function applyTheme(index) {
            const theme = themes[index];
            document.body.classList.remove(...themes.map(t => `theme-${t.id}`));
            document.body.classList.add(`theme-${theme.id}`);
            themeSwitch.style.backgroundColor = theme.color;
            themeSwitch.style.boxShadow = `0 0 6px ${theme.color}`;
            currentThemeIndex = index;
            localStorage.setItem('selectedThemeIndex', index);
            const t = translations[currentLang];
            showToast((t.toastThemeChanged || 'Тема: ') + theme.name);
        }
        function nextTheme() {
            applyTheme((currentThemeIndex + 1) % themes.length);
        }
        function loadSavedTheme() {
            const saved = localStorage.getItem('selectedThemeIndex');
            let idx = (saved !== null && !isNaN(parseInt(saved))) ? parseInt(saved) : 1;
            idx = Math.min(Math.max(0, idx), themes.length - 1);
            applyTheme(idx);
        }
        themeSwitch.addEventListener('click', nextTheme);

        // --- Профиль (аватар, описание) ---
        const bioInput = document.getElementById('bioInput');
        const avatarContainer = document.getElementById('avatarContainer');
        const avatarInput = document.getElementById('avatarInput');
        let currentAvatarBase64 = localStorage.getItem('userAvatar') || null;

        function renderAvatar() {
            avatarContainer.innerHTML = '';
            if (currentAvatarBase64) {
                const img = document.createElement('img');
                img.src = currentAvatarBase64;
                img.className = 'avatar';
                img.alt = 'avatar';
                avatarContainer.appendChild(img);
            } else {
                const placeholder = document.createElement('div');
                placeholder.className = 'avatar-placeholder';
                const firstLetter = (user.first_name ? user.first_name.charAt(0) : '?').toUpperCase();
                placeholder.textContent = firstLetter;
                avatarContainer.appendChild(placeholder);
            }
        }
        function saveAvatar(base64) {
            currentAvatarBase64 = base64;
            localStorage.setItem('userAvatar', base64 || '');
            renderAvatar();
            showToast(translations[currentLang].labelAvatar.split(' ')[0] || 'Avatar updated');
        }
        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => saveAvatar(ev.target.result);
                reader.readAsDataURL(file);
            } else {
                showToast(translations[currentLang].bioPlaceholder === 'Расскажите о себе...' ? 'Выберите изображение' : 'Select an image');
            }
        });
        let userBio = localStorage.getItem('userBio') || '';
        bioInput.value = userBio;
        bioInput.addEventListener('input', () => {
            userBio = bioInput.value;
            localStorage.setItem('userBio', userBio);
        });

        // Данные Telegram
        document.getElementById('tgId').textContent = user.id;
        document.getElementById('tgUsername').textContent = user.username || '—';
        document.getElementById('tgFirstName').textContent = `${user.first_name || ''} ${user.last_name || ''}`.trim() || '—';

        // --- Поддержка: демо-отправка ---
        document.getElementById('sendSupportBtn').addEventListener('click', () => {
            const subject = document.getElementById('supportSubject').value;
            const message = document.getElementById('supportMessage').value;
            if (!subject.trim() || !message.trim()) {
                showToast(translations[currentLang].supportSubjectPlaceholder === 'Тема' ? 'Заполните тему и сообщение' : 'Fill subject and message');
                return;
            }
            // Имитация отправки
            showToast(translations[currentLang].supportSent);
            document.getElementById('supportSubject').value = '';
            document.getElementById('supportMessage').value = '';
        });

        // --- Инициализация ---
        loadSavedTheme();
        applyLanguage(currentLang);
        renderAvatar();
        // Восстановление последней открытой вкладки
        const lastTab = localStorage.getItem('lastTab');
        if (lastTab && pages[lastTab]) showTab(lastTab);
        else showTab('tasks');
    </script>
</body>
</html>
