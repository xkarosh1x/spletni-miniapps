<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mini App — Шрифты + Тема</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Подключаем шрифты Google (для Roboto, Open Sans, Montserrat) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Глобальная переменная для шрифта — её мы будем менять */
        :root {
            --current-font: 'Courier New', monospace; /* по умолчанию будет заменён на Minecraft */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s;
            /* Все элементы наследуют шрифт из переменной */
            font-family: var(--current-font), inherit;
        }

        body {
            padding: 20px;
            min-height: 100vh;
        }

        /* Кнопка смены шрифта (левая) */
        .font-switch {
            position: fixed;
            top: 20px;
            right: 80px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.1s, box-shadow 0.2s;
            background-color: #2c2c2c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }
        .font-switch:active { transform: scale(0.94); }

        /* Кнопка смены темы (правая) */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .theme-switch:active { transform: scale(0.94); }

        /* Тост */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1001;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding-top: 20px;
        }

        .card {
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }

        .demo-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
        }

        /* ---------- ТЕМЫ (без переопределения шрифта) ---------- */
        body.theme-light {
            background: #f5f5f7;
            color: #1c1c1e;
        }
        body.theme-light .card {
            background: #ffffff;
            border: 1px solid #e3e3e8;
        }
        body.theme-light .demo-btn {
            background: #007aff;
            color: white;
        }

        body.theme-dark {
            background: #0a0a0a;
            color: #e0e0e0;
        }
        body.theme-dark .card {
            background: #1e1e1e;
            border: 1px solid #2c2c2c;
        }
        body.theme-dark .demo-btn {
            background: #0d6efd;
            color: white;
        }

        body.theme-purple {
            background: #17092b;
            color: #e2d6ff;
        }
        body.theme-purple .card {
            background: #2a1642;
            border: 1px solid #6b3fa0;
        }
        body.theme-purple .demo-btn {
            background: #9b59b6;
            color: white;
        }

        body.theme-green {
            background: #0a2a16;
            color: #c8f0dc;
        }
        body.theme-green .card {
            background: #164e2c;
            border: 1px solid #2e8b57;
        }
        body.theme-green .demo-btn {
            background: #2ecc71;
            color: #0a2a16;
        }

        body.theme-red {
            background: #2b0c0c;
            color: #ffd6d6;
        }
        body.theme-red .card {
            background: #4e1c1c;
            border: 1px solid #bf4b4b;
        }
        body.theme-red .demo-btn {
            background: #e74c3c;
            color: white;
        }

        body.theme-blue {
            background: #0a1a3a;
            color: #cfe3ff;
        }
        body.theme-blue .card {
            background: #1a2f5c;
            border: 1px solid #3a6ea5;
        }
        body.theme-blue .demo-btn {
            background: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>
    <div class="font-switch" id="fontSwitch">Aa</div>
    <div class="theme-switch" id="themeSwitch"></div>
    <div class="toast" id="toast"></div>

    <div class="container">
        <div class="card">
            <h2>🧩 Меняй шрифт и тему</h2>
            <p>🔤 Левая кнопка <strong>Aa</strong> — шрифт (6 вариантов).</p>
            <p>🎨 Правая кнопка — тема оформления.</p>
            <button class="demo-btn" id="demoBtn">Показать текущие настройки</button>
        </div>
        <div class="card">
            <p>✨ Любой текст, карточки и кнопки сразу меняют шрифт.</p>
            <p>Проверь: нажми на Aa — всё изменится.</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        // --- Темы (оставляем как было) ---
        const themes = [
            { id: 'light',  name: 'Светлая',  color: '#f1c40f' },
            { id: 'dark',   name: 'Тёмная',   color: '#f9e45b' },
            { id: 'purple', name: 'Фиолетовая', color: '#cd9eff' },
            { id: 'green',  name: 'Зелёная',  color: '#7bed9f' },
            { id: 'red',    name: 'Красная',  color: '#ff8a7a' },
            { id: 'blue',   name: 'Синяя',    color: '#6aa9ff' }
        ];
        let currentThemeIndex = 1;
        const themeSwitch = document.getElementById('themeSwitch');
        const toast = document.getElementById('toast');

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        function applyTheme(index) {
            const theme = themes[index];
            document.body.classList.remove(...themes.map(t => `theme-${t.id}`));
            document.body.classList.add(`theme-${theme.id}`);
            themeSwitch.style.backgroundColor = theme.color;
            themeSwitch.style.boxShadow = `0 0 6px ${theme.color}`;
            currentThemeIndex = index;
            localStorage.setItem('selectedThemeIndex', index);
            showToast(`Тема: ${theme.name}`);
        }

        function nextTheme() {
            applyTheme((currentThemeIndex + 1) % themes.length);
        }

        function loadSavedTheme() {
            const saved = localStorage.getItem('selectedThemeIndex');
            let idx = (saved !== null && !isNaN(parseInt(saved))) ? parseInt(saved) : 1;
            idx = Math.min(Math.max(0, idx), themes.length - 1);
            applyTheme(idx);
        }

        // --- Шрифты (первый — Minecraft, остальные популярные) ---
        // Используем реально существующие шрифты. Для Minecraft возьмём 'Courier New' как самый близкий,
        // но для настоящего майнкрафтовского стиля используем 'Courier New', 'Lucida Console', monospace.
        // Если нужен точно такой же, можно подключить шрифт через @font-face (я добавлю ниже).
        const fonts = [
            { name: 'Minecraft', family: "'Courier New', 'Lucida Console', monospace" },
            { name: 'Roboto',    family: "'Roboto', sans-serif" },
            { name: 'Open Sans', family: "'Open Sans', sans-serif" },
            { name: 'Montserrat',family: "'Montserrat', sans-serif" },
            { name: 'Arial',     family: "Arial, sans-serif" },
            { name: 'Helvetica', family: "Helvetica, sans-serif" }
        ];

        let currentFontIndex = 0;

        const fontSwitch = document.getElementById('fontSwitch');

        function applyFont(index) {
            const font = fonts[index];
            // Меняем CSS-переменную на уровне :root
            document.documentElement.style.setProperty('--current-font', font.family);
            currentFontIndex = index;
            localStorage.setItem('selectedFontIndex', index);
            showToast(`Шрифт: ${font.name}`);
        }

        function nextFont() {
            applyFont((currentFontIndex + 1) % fonts.length);
        }

        function loadSavedFont() {
            const saved = localStorage.getItem('selectedFontIndex');
            let idx = (saved !== null && !isNaN(parseInt(saved))) ? parseInt(saved) : 0;
            idx = Math.min(Math.max(0, idx), fonts.length - 1);
            applyFont(idx);
        }

        // Обработчики
        themeSwitch.addEventListener('click', nextTheme);
        fontSwitch.addEventListener('click', nextFont);

        document.getElementById('demoBtn').addEventListener('click', () => {
            const currentTheme = themes[currentThemeIndex];
            const currentFont = fonts[currentFontIndex];
            tg.showPopup({
                title: '📋 Настройки',
                message: `Тема: ${currentTheme.name}\nШрифт: ${currentFont.name}`,
                buttons: [{type: 'ok'}]
            });
        });

        // Инициализация
        loadSavedTheme();
        loadSavedFont();

        // (Дополнительно) Если хотите настоящий Minecraft шрифт — можно подключить, но 'Courier New' отлично имитирует.
        // Раскомментируйте блок ниже, если нужен точный пиксельный шрифт.
        /*
        const style = document.createElement('style');
        style.textContent = `@font-face { font-family: 'Minecraft'; src: url('https://cdn.jsdelivr.net/npm/minecraft-font@1.0.0/Minecraft.woff2') format('woff2'); }`;
        document.head.appendChild(style);
        // И тогда в fonts[0].family замените на "'Minecraft', monospace"
        */
    </script>
</body>
</html>
