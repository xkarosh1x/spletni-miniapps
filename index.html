<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mini App — Пиксель + Профиль + Язык</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s;
            font-family: 'Courier New', 'Lucida Console', 'Monaco', monospace !important;
        }

        body {
            padding: 20px;
            min-height: 100vh;
        }

        /* Кнопка смены темы (правый верхний угол) */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .theme-switch:active {
            transform: scale(0.94);
        }

        /* Кнопка смены языка (левый верхний угол) */
        .lang-switch {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            background: #2c2c2c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .lang-switch:active {
            transform: scale(0.94);
        }

        /* Тост */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            z-index: 1001;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding-top: 20px;
        }

        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        .card {
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
        }

        /* Профиль */
        .avatar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            background: #888;
            border: 3px solid currentColor;
        }
        .avatar-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }
        .profile-info {
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-field {
            margin: 16px 0;
        }
        .profile-field label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .profile-field input, .profile-field textarea {
            width: 100%;
            padding: 10px;
            border-radius: 16px;
            border: 1px solid #aaa;
            background: rgba(255,255,255,0.1);
            font-size: 14px;
            resize: vertical;
        }
        .file-input {
            margin: 10px 0;
        }

        /* ----- ТЕМЫ (общие для всех страниц) ----- */
        body.theme-light {
            background: #f5f5f7;
            color: #1c1c1e;
        }
        body.theme-light .card {
            background: #ffffff;
            border: 1px solid #e3e3e8;
        }
        body.theme-light .btn {
            background: #007aff;
            color: white;
        }
        body.theme-light input, body.theme-light textarea {
            background: #f0f0f2;
            color: #1c1c1e;
            border-color: #ccc;
        }
        body.theme-light .lang-switch {
            background: #2c2c2c;
            color: white;
        }

        body.theme-dark {
            background: #0a0a0a;
            color: #e0e0e0;
        }
        body.theme-dark .card {
            background: #1e1e1e;
            border: 1px solid #2c2c2c;
        }
        body.theme-dark .btn {
            background: #0d6efd;
            color: white;
        }
        body.theme-dark input, body.theme-dark textarea {
            background: #2a2a2a;
            color: #e0e0e0;
            border-color: #444;
        }
        body.theme-dark .lang-switch {
            background: #2c2c2c;
            color: white;
        }

        body.theme-purple {
            background: #17092b;
            color: #e2d6ff;
        }
        body.theme-purple .card {
            background: #2a1642;
            border: 1px solid #6b3fa0;
        }
        body.theme-purple .btn {
            background: #9b59b6;
            color: white;
        }
        body.theme-purple input, body.theme-purple textarea {
            background: #3a235a;
            color: #e2d6ff;
            border-color: #7a4fa0;
        }
        body.theme-purple .lang-switch {
            background: #2c2c2c;
            color: white;
        }

        body.theme-green {
            background: #0a2a16;
            color: #c8f0dc;
        }
        body.theme-green .card {
            background: #164e2c;
            border: 1px solid #2e8b57;
        }
        body.theme-green .btn {
            background: #2ecc71;
            color: #0a2a16;
        }
        body.theme-green input, body.theme-green textarea {
            background: #1e5a36;
            color: #c8f0dc;
            border-color: #3a8a5a;
        }
        body.theme-green .lang-switch {
            background: #2c2c2c;
            color: white;
        }

        body.theme-red {
            background: #2b0c0c;
            color: #ffd6d6;
        }
        body.theme-red .card {
            background: #4e1c1c;
            border: 1px solid #bf4b4b;
        }
        body.theme-red .btn {
            background: #e74c3c;
            color: white;
        }
        body.theme-red input, body.theme-red textarea {
            background: #5e2a2a;
            color: #ffd6d6;
            border-color: #b55a5a;
        }
        body.theme-red .lang-switch {
            background: #2c2c2c;
            color: white;
        }

        body.theme-blue {
            background: #0a1a3a;
            color: #cfe3ff;
        }
        body.theme-blue .card {
            background: #1a2f5c;
            border: 1px solid #3a6ea5;
        }
        body.theme-blue .btn {
            background: #3b82f6;
            color: white;
        }
        body.theme-blue input, body.theme-blue textarea {
            background: #1e3a6e;
            color: #cfe3ff;
            border-color: #5a8ac0;
        }
        body.theme-blue .lang-switch {
            background: #2c2c2c;
            color: white;
        }
    </style>
</head>
<body>
    <div class="lang-switch" id="langSwitch">RU</div>
    <div class="theme-switch" id="themeSwitch"></div>
    <div class="toast" id="toast"></div>

    <!-- Главная страница -->
    <div id="mainPage" class="page active">
        <div class="container">
            <div class="card">
                <h2 id="mainTitle">🕹️ Пиксельный стиль</h2>
                <p id="mainDesc1">Шрифт всегда в духе Minecraft / ретро-игр.</p>
                <p id="mainDesc2">🎨 Нажми на кружок справа вверху — тема поменяется.</p>
                <button class="btn" id="profileBtn">👤 Мой профиль</button>
            </div>
            <div class="card">
                <p id="mainDesc3">✨ Название темы показывается ровно 1.5 секунды.</p>
                <p id="mainDesc4">Скорость исчезновения одинаковая для всех тем.</p>
            </div>
        </div>
    </div>

    <!-- Страница профиля -->
    <div id="profilePage" class="page">
        <div class="container">
            <div class="card">
                <div class="avatar-container" id="avatarContainer"></div>
                <div class="profile-info">
                    <p><strong id="labelTgId">Telegram ID:</strong> <span id="tgId">—</span></p>
                    <p><strong id="labelUsername">Username:</strong> <span id="tgUsername">—</span></p>
                    <p><strong id="labelFirstName">Имя:</strong> <span id="tgFirstName">—</span></p>
                </div>
                <div class="profile-field">
                    <label id="labelBio">✏️ Описание профиля</label>
                    <textarea id="bioInput" rows="3" placeholder="Расскажите о себе..."></textarea>
                </div>
                <div class="profile-field">
                    <label id="labelAvatar">🖼️ Загрузить аватар</label>
                    <input type="file" id="avatarInput" accept="image/*" class="file-input">
                </div>
                <button class="btn" id="backToMainBtn">← На главную</button>
            </div>
        </div>
    </div>

    <script>
        // --- Telegram WebApp и данные пользователя ---
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        let user = tg.initDataUnsafe?.user || null;
        if (!user) {
            user = { id: 123456, first_name: "Игрок", last_name: "", username: "pixel_player" };
        }

        // --- Элементы ---
        const themeSwitch = document.getElementById('themeSwitch');
        const langSwitch = document.getElementById('langSwitch');
        const toast = document.getElementById('toast');
        let toastTimeout = null;

        function showToast(message) {
            if (toastTimeout) clearTimeout(toastTimeout);
            toast.classList.remove('show');
            void toast.offsetWidth;
            toast.textContent = message;
            toast.classList.add('show');
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
                toastTimeout = null;
            }, 1500);
        }

        // --- Языки и переводы ---
        const translations = {
            ru: {
                langName: 'Русский',
                mainTitle: '🕹️ Пиксельный стиль',
                mainDesc1: 'Шрифт всегда в духе Minecraft / ретро-игр.',
                mainDesc2: '🎨 Нажми на кружок справа вверху — тема поменяется.',
                mainDesc3: '✨ Название темы показывается ровно 1.5 секунды.',
                mainDesc4: 'Скорость исчезновения одинаковая для всех тем.',
                profileBtn: '👤 Мой профиль',
                backBtn: '← На главную',
                labelTgId: 'Telegram ID:',
                labelUsername: 'Username:',
                labelFirstName: 'Имя:',
                labelBio: '✏️ Описание профиля',
                labelAvatar: '🖼️ Загрузить аватар',
                bioPlaceholder: 'Расскажите о себе...',
                toastThemeChanged: 'Тема: ',
                toastLangChanged: 'Язык: '
            },
            en: {
                langName: 'English',
                mainTitle: '🕹️ Pixel style',
                mainDesc1: 'Font is always in Minecraft / retro games style.',
                mainDesc2: '🎨 Tap the circle on the top right — theme will change.',
                mainDesc3: '✨ Theme name is shown for exactly 1.5 seconds.',
                mainDesc4: 'Fade speed is the same for all themes.',
                profileBtn: '👤 My profile',
                backBtn: '← Back to main',
                labelTgId: 'Telegram ID:',
                labelUsername: 'Username:',
                labelFirstName: 'Name:',
                labelBio: '✏️ Profile bio',
                labelAvatar: '🖼️ Upload avatar',
                bioPlaceholder: 'Tell about yourself...',
                toastThemeChanged: 'Theme: ',
                toastLangChanged: 'Language: '
            }
        };

        let currentLang = localStorage.getItem('selectedLang') || 'ru';

        function applyLanguage(lang) {
            const t = translations[lang];
            if (!t) return;
            document.getElementById('mainTitle').innerText = t.mainTitle;
            document.getElementById('mainDesc1').innerText = t.mainDesc1;
            document.getElementById('mainDesc2').innerText = t.mainDesc2;
            document.getElementById('mainDesc3').innerText = t.mainDesc3;
            document.getElementById('mainDesc4').innerText = t.mainDesc4;
            document.getElementById('profileBtn').innerText = t.profileBtn;
            document.getElementById('backToMainBtn').innerText = t.backBtn;
            document.getElementById('labelTgId').innerHTML = t.labelTgId;
            document.getElementById('labelUsername').innerHTML = t.labelUsername;
            document.getElementById('labelFirstName').innerHTML = t.labelFirstName;
            document.getElementById('labelBio').innerHTML = t.labelBio;
            document.getElementById('labelAvatar').innerHTML = t.labelAvatar;
            const bioInput = document.getElementById('bioInput');
            bioInput.placeholder = t.bioPlaceholder;
            langSwitch.innerText = lang === 'ru' ? 'RU' : 'EN';
            localStorage.setItem('selectedLang', lang);
            currentLang = lang;
            showToast(t.toastLangChanged + (lang === 'ru' ? 'Русский' : 'English'));
        }

        function toggleLanguage() {
            const newLang = currentLang === 'ru' ? 'en' : 'ru';
            applyLanguage(newLang);
        }

        langSwitch.addEventListener('click', toggleLanguage);

        // --- Темы (оставляем как было) ---
        const themes = [
            { id: 'light',  name: 'Светлая',  color: '#f1c40f' },
            { id: 'dark',   name: 'Тёмная',   color: '#f9e45b' },
            { id: 'purple', name: 'Фиолетовая', color: '#cd9eff' },
            { id: 'green',  name: 'Зелёная',  color: '#7bed9f' },
            { id: 'red',    name: 'Красная',  color: '#ff8a7a' },
            { id: 'blue',   name: 'Синяя',    color: '#6aa9ff' }
        ];
        let currentThemeIndex = 1;

        function applyTheme(index) {
            const theme = themes[index];
            document.body.classList.remove(...themes.map(t => `theme-${t.id}`));
            document.body.classList.add(`theme-${theme.id}`);
            themeSwitch.style.backgroundColor = theme.color;
            themeSwitch.style.boxShadow = `0 0 6px ${theme.color}`;
            currentThemeIndex = index;
            localStorage.setItem('selectedThemeIndex', index);
            const lang = currentLang;
            const t = translations[lang];
            showToast((t.toastThemeChanged || 'Тема: ') + theme.name);
        }

        function nextTheme() {
            applyTheme((currentThemeIndex + 1) % themes.length);
        }

        function loadSavedTheme() {
            const saved = localStorage.getItem('selectedThemeIndex');
            let idx = (saved !== null && !isNaN(parseInt(saved))) ? parseInt(saved) : 1;
            idx = Math.min(Math.max(0, idx), themes.length - 1);
            applyTheme(idx);
        }

        // --- Профиль (аватар, описание) ---
        const bioInput = document.getElementById('bioInput');
        const avatarContainer = document.getElementById('avatarContainer');
        const avatarInput = document.getElementById('avatarInput');
        let currentAvatarBase64 = localStorage.getItem('userAvatar') || null;

        function renderAvatar() {
            avatarContainer.innerHTML = '';
            if (currentAvatarBase64) {
                const img = document.createElement('img');
                img.src = currentAvatarBase64;
                img.className = 'avatar';
                img.alt = 'avatar';
                avatarContainer.appendChild(img);
            } else {
                const placeholder = document.createElement('div');
                placeholder.className = 'avatar-placeholder';
                const firstLetter = (user.first_name ? user.first_name.charAt(0) : '?').toUpperCase();
                placeholder.textContent = firstLetter;
                avatarContainer.appendChild(placeholder);
            }
        }

        function saveAvatar(base64) {
            currentAvatarBase64 = base64;
            localStorage.setItem('userAvatar', base64 || '');
            renderAvatar();
            const t = translations[currentLang];
            showToast(t.labelAvatar?.split(' ')[0] || 'Аватар обновлён');
        }

        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    saveAvatar(ev.target.result);
                };
                reader.readAsDataURL(file);
            } else {
                const t = translations[currentLang];
                showToast(t.bioPlaceholder === 'Расскажите о себе...' ? 'Выберите изображение' : 'Select an image');
            }
        });

        let userBio = localStorage.getItem('userBio') || '';
        bioInput.value = userBio;
        bioInput.addEventListener('input', () => {
            userBio = bioInput.value;
            localStorage.setItem('userBio', userBio);
        });

        // Заполняем данные Telegram (не локализуются, сами данные)
        document.getElementById('tgId').textContent = user.id;
        document.getElementById('tgUsername').textContent = user.username || '—';
        document.getElementById('tgFirstName').textContent = `${user.first_name || ''} ${user.last_name || ''}`.trim() || '—';

        // --- Переключение страниц ---
        const mainPage = document.getElementById('mainPage');
        const profilePage = document.getElementById('profilePage');
        const profileBtn = document.getElementById('profileBtn');
        const backToMainBtn = document.getElementById('backToMainBtn');

        function showPage(pageName) {
            if (pageName === 'main') {
                mainPage.classList.add('active');
                profilePage.classList.remove('active');
            } else {
                mainPage.classList.remove('active');
                profilePage.classList.add('active');
                renderAvatar();
            }
        }

        profileBtn.addEventListener('click', () => showPage('profile'));
        backToMainBtn.addEventListener('click', () => showPage('main'));

        // --- События ---
        themeSwitch.addEventListener('click', nextTheme);

        // --- Инициализация ---
        loadSavedTheme();
        applyLanguage(currentLang);
        renderAvatar();
    </script>
</body>
</html>
