<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mini App — Пиксельный шрифт + Тема</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s;
            /* Пиксельный шрифт для всех элементов */
            font-family: 'Courier New', 'Lucida Console', 'Monaco', monospace !important;
        }

        body {
            padding: 20px;
            min-height: 100vh;
        }

        /* Кнопка смены темы (правый верхний угол) */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .theme-switch:active {
            transform: scale(0.94);
        }

        /* Тост (уведомление) */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            z-index: 1001;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
            white-space: nowrap;
            font-family: 'Courier New', monospace !important;
        }
        .toast.show {
            opacity: 1;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding-top: 20px;
        }

        .card {
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }

        .demo-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
        }

        /* ---------- ТЕМЫ ---------- */
        body.theme-light {
            background: #f5f5f7;
            color: #1c1c1e;
        }
        body.theme-light .card {
            background: #ffffff;
            border: 1px solid #e3e3e8;
        }
        body.theme-light .demo-btn {
            background: #007aff;
            color: white;
        }

        body.theme-dark {
            background: #0a0a0a;
            color: #e0e0e0;
        }
        body.theme-dark .card {
            background: #1e1e1e;
            border: 1px solid #2c2c2c;
        }
        body.theme-dark .demo-btn {
            background: #0d6efd;
            color: white;
        }

        body.theme-purple {
            background: #17092b;
            color: #e2d6ff;
        }
        body.theme-purple .card {
            background: #2a1642;
            border: 1px solid #6b3fa0;
        }
        body.theme-purple .demo-btn {
            background: #9b59b6;
            color: white;
        }

        body.theme-green {
            background: #0a2a16;
            color: #c8f0dc;
        }
        body.theme-green .card {
            background: #164e2c;
            border: 1px solid #2e8b57;
        }
        body.theme-green .demo-btn {
            background: #2ecc71;
            color: #0a2a16;
        }

        body.theme-red {
            background: #2b0c0c;
            color: #ffd6d6;
        }
        body.theme-red .card {
            background: #4e1c1c;
            border: 1px solid #bf4b4b;
        }
        body.theme-red .demo-btn {
            background: #e74c3c;
            color: white;
        }

        body.theme-blue {
            background: #0a1a3a;
            color: #cfe3ff;
        }
        body.theme-blue .card {
            background: #1a2f5c;
            border: 1px solid #3a6ea5;
        }
        body.theme-blue .demo-btn {
            background: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>
    <div class="theme-switch" id="themeSwitch"></div>
    <div class="toast" id="toast"></div>

    <div class="container">
        <div class="card">
            <h2>🕹️ Пиксельный стиль</h2>
            <p>Шрифт всегда в духе Minecraft / ретро-игр.</p>
            <p>🎨 Нажми на кружок справа вверху — тема поменяется.</p>
            <button class="demo-btn" id="demoBtn">Показать текущую тему</button>
        </div>
        <div class="card">
            <p>✨ Название темы показывается ровно 1.5 секунды и плавно исчезает.</p>
            <p>Скорость исчезновения теперь одинаковая для всех тем.</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        // --- Темы ---
        const themes = [
            { id: 'light',  name: 'Светлая',  color: '#f1c40f' },
            { id: 'dark',   name: 'Тёмная',   color: '#f9e45b' },
            { id: 'purple', name: 'Фиолетовая', color: '#cd9eff' },
            { id: 'green',  name: 'Зелёная',  color: '#7bed9f' },
            { id: 'red',    name: 'Красная',  color: '#ff8a7a' },
            { id: 'blue',   name: 'Синяя',    color: '#6aa9ff' }
        ];

        let currentThemeIndex = 1; // по умолчанию тёмная
        const themeSwitch = document.getElementById('themeSwitch');
        const toast = document.getElementById('toast');
        let toastTimeout = null;

        function showToast(message) {
            // Сбрасываем предыдущий таймер, чтобы надпись не исчезала раньше времени
            if (toastTimeout) {
                clearTimeout(toastTimeout);
                toastTimeout = null;
            }
            // Убираем класс, чтобы сбросить анимацию (если уже показывается)
            toast.classList.remove('show');
            // Небольшой форсированный reflow для перезапуска анимации
            void toast.offsetWidth;
            toast.textContent = message;
            toast.classList.add('show');
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
                toastTimeout = null;
            }, 1500); // ровно 1.5 секунды
        }

        function applyTheme(index) {
            const theme = themes[index];
            document.body.classList.remove(...themes.map(t => `theme-${t.id}`));
            document.body.classList.add(`theme-${theme.id}`);
            themeSwitch.style.backgroundColor = theme.color;
            themeSwitch.style.boxShadow = `0 0 6px ${theme.color}`;
            currentThemeIndex = index;
            localStorage.setItem('selectedThemeIndex', index);
            showToast(`Тема: ${theme.name}`);
        }

        function nextTheme() {
            let newIndex = currentThemeIndex + 1;
            if (newIndex >= themes.length) newIndex = 0;
            applyTheme(newIndex);
        }

        function loadSavedTheme() {
            const saved = localStorage.getItem('selectedThemeIndex');
            let idx = (saved !== null && !isNaN(parseInt(saved))) ? parseInt(saved) : 1;
            idx = Math.min(Math.max(0, idx), themes.length - 1);
            applyTheme(idx);
        }

        themeSwitch.addEventListener('click', nextTheme);

        document.getElementById('demoBtn').addEventListener('click', () => {
            const currentTheme = themes[currentThemeIndex];
            tg.showPopup({
                title: '🎨 Текущая тема',
                message: `Тема: "${currentTheme.name}"\nШрифт — пиксельный (Minecraft)`,
                buttons: [{type: 'ok'}]
            });
        });

        loadSavedTheme();
    </script>
</body>
</html>
